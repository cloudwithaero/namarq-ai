<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namarq AI</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400&family=EB+Garamond&display=swap" rel="stylesheet">

<style>
:root {
  --ivory: #FAF8F4;
  --olive: #6B705C;
  --brown: #3E2F23;
  --beige: #D6CCC2;
  --amber: #A47148;
}

body {
  margin: 0;
  background: var(--ivory);
  color: var(--brown);
  font-family: 'EB Garamond', serif;
}

/* container */
.container {
  max-width: 900px;
  margin: auto;
  padding: 80px 30px;
}

/* logo */
.logo {
  text-align: center;
  margin-bottom: 50px;
}

.logo h1 {
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.5em;
  font-weight: 300;
}

.logo span {
  font-family: 'Montserrat';
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--olive);
}

/* card */
.card {
  background: white;
  padding: 40px;
  border: 1px solid var(--beige);
}

/* inputs */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

input {
  padding: 12px;
  border: 1px solid var(--beige);
  background: transparent;
  font-family: 'EB Garamond';
}

/* button */
button {
  margin-top: 30px;
  width: 100%;
  padding: 14px;
  border: none;
  background: var(--brown);
  color: white;
  letter-spacing: 0.2em;
  cursor: pointer;
}

button:hover {
  background: var(--olive);
}

/* result */
.result {
  margin-top: 40px;
  padding: 30px;
  border: 1px solid var(--beige);
  background: #fff;
  white-space: pre-wrap;
  line-height: 1.8;
}

/* copy */
.copy {
  margin-top: 15px;
  background: transparent;
  border: 1px solid var(--brown);
  color: var(--brown);
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <h1>NAMARQ</h1>
    <span>PERFUME HOUSE</span>
  </div>

  <div class="card">

    <div class="grid">
      <input id="name" placeholder="Product Name">
      <input id="gender" placeholder="Gender">
      <input id="top" placeholder="Top Notes">
      <input id="heart" placeholder="Heart Notes">
      <input id="base" placeholder="Base Notes">
      <input id="vibe" placeholder="Vibe">
    </div>

    <button onclick="generate()">GENERATE</button>

    <div id="result" class="result"></div>

    <button class="copy" onclick="copyText()">Copy Output</button>

  </div>

</div>

<script>
async function generate() {
  const data = {
    name: name.value,
    gender: gender.value,
    top: top.value,
    heart: heart.value,
    base: base.value,
    vibe: vibe.value
  };

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const json = await res.json();
  result.innerText = json.output;
}

function copyText() {
  navigator.clipboard.writeText(result.innerText);
  alert("Copied");
}
</script>

</body>
</html>
