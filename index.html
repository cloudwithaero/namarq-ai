<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namarq AI — Perfume SEO Generator</title>
<meta name="description" content="AI-powered SEO copy generator for Namarq Perfumes.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ── Reset ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design Tokens ───────────────────────────────────────────── */
:root {
  --ivory:       #FAF8F4;
  --ivory-dark:  #F2EDE5;
  --white:       #FFFFFF;
  --beige:       #DDD5C8;
  --beige-light: #EDE8E1;
  --brown:       #2C1E14;
  --brown-mid:   #4A3728;
  --olive:       #6B705C;
  --amber:       #A47148;
  --amber-light: #C4956A;
  --gold:        #C9A96E;
  --gold-light:  #E8D5A3;
  --muted:       #8A7E74;

  --font-serif:   'Cormorant Garamond', Georgia, serif;
  --font-sans:    'Montserrat', system-ui, sans-serif;

  --radius:       2px;
  --transition:   all 0.25s ease;
  --shadow-sm:    0 1px 4px rgba(44,30,20,0.06);
  --shadow-md:    0 4px 24px rgba(44,30,20,0.10);
  --shadow-lg:    0 12px 48px rgba(44,30,20,0.14);
}

/* ── Base ────────────────────────────────────────────────────── */
html { scroll-behavior: smooth; }

body {
  background: var(--ivory);
  color: var(--brown);
  font-family: var(--font-serif);
  font-size: 17px;
  line-height: 1.7;
  min-height: 100vh;
}

/* ── Layout ──────────────────────────────────────────────────── */
.page {
  max-width: 820px;
  margin: 0 auto;
  padding: 64px 24px 120px;
}

/* ── Header ──────────────────────────────────────────────────── */
.header {
  text-align: center;
  margin-bottom: 56px;
}

.header__wordmark {
  font-family: var(--font-serif);
  font-weight: 300;
  font-size: clamp(36px, 8vw, 64px);
  letter-spacing: 0.55em;
  color: var(--brown);
  text-transform: uppercase;
  line-height: 1;
}

.header__sub {
  font-family: var(--font-sans);
  font-weight: 300;
  font-size: 9px;
  letter-spacing: 0.55em;
  color: var(--olive);
  text-transform: uppercase;
  margin-top: 10px;
  display: block;
}

.header__rule {
  width: 1px;
  height: 40px;
  background: var(--beige);
  margin: 20px auto 0;
}

/* ── Card ────────────────────────────────────────────────────── */
.card {
  background: var(--white);
  border: 1px solid var(--beige);
  padding: 48px 48px 56px;
  box-shadow: var(--shadow-sm);
}

@media (max-width: 600px) {
  .card { padding: 28px 20px 36px; }
}

/* ── Form ────────────────────────────────────────────────────── */
.form__label {
  display: block;
  font-family: var(--font-sans);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--olive);
  margin-bottom: 10px;
}

.form__input {
  display: block;
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--beige);
  background: var(--ivory);
  font-family: var(--font-serif);
  font-size: 17px;
  color: var(--brown);
  outline: none;
  transition: var(--transition);
  border-radius: var(--radius);
  appearance: none;
}

.form__input::placeholder { color: var(--muted); font-style: italic; }
.form__input:focus { border-color: var(--amber); background: var(--white); }

.form__btn {
  display: block;
  width: 100%;
  margin-top: 16px;
  padding: 15px 24px;
  border: none;
  background: var(--brown);
  color: var(--ivory);
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.45em;
  text-transform: uppercase;
  cursor: pointer;
  transition: var(--transition);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
}

.form__btn:hover:not(:disabled) { background: var(--brown-mid); }
.form__btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* ── Loading state ───────────────────────────────────────────── */
.loading {
  display: none;
  text-align: center;
  padding: 48px 0 24px;
  color: var(--muted);
}

.loading.is-active { display: block; }

.loading__dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 16px;
}

.loading__dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--amber);
  animation: pulse 1.4s ease-in-out infinite;
}

.loading__dot:nth-child(2) { animation-delay: 0.2s; }
.loading__dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

.loading__text {
  font-family: var(--font-sans);
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
}

/* ── Result ──────────────────────────────────────────────────── */
.result {
  display: none;
  margin-top: 48px;
  animation: fadeUp 0.45s ease forwards;
}

.result.is-visible { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Result header bar ───────────────────────────────────────── */
.result__header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--beige-light);
  flex-wrap: wrap;
}

.result__name {
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 400;
  line-height: 1.2;
  color: var(--brown);
}

.result__house {
  font-family: var(--font-sans);
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--olive);
  text-transform: uppercase;
  margin-top: 4px;
}

/* ── Confidence badge ────────────────────────────────────────── */
.badge {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 30px;
  font-family: var(--font-sans);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.25em;
  text-transform: uppercase;
}

.badge--high   { background: #EBF5EC; color: #2D6A30; border: 1px solid #A8D5AB; }
.badge--medium { background: #FEF9EC; color: #8A6520; border: 1px solid #E8D08A; }
.badge--low    { background: #FEF0EE; color: #8A2E2A; border: 1px solid #E8A8A3; }

.badge__dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.badge--high   .badge__dot { background: #2D6A30; }
.badge--medium .badge__dot { background: #8A6520; }
.badge--low    .badge__dot { background: #8A2E2A; }

/* ── Profile grid ────────────────────────────────────────────── */
.profile {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1px;
  background: var(--beige-light);
  border: 1px solid var(--beige-light);
  margin-bottom: 36px;
}

.profile__cell {
  background: var(--ivory);
  padding: 16px 18px;
}

.profile__key {
  font-family: var(--font-sans);
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.3em;
  color: var(--olive);
  text-transform: uppercase;
  margin-bottom: 5px;
}

.profile__val {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--brown);
  line-height: 1.5;
}

/* ── SEO Output ──────────────────────────────────────────────── */
.seo-output {
  background: var(--white);
  border: 1px solid var(--beige);
  padding: 36px 40px;
  position: relative;
}

@media (max-width: 600px) {
  .seo-output { padding: 24px 20px; }
}

.seo-output__toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--beige-light);
}

.seo-output__label {
  font-family: var(--font-sans);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.4em;
  color: var(--olive);
  text-transform: uppercase;
}

.copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 16px;
  border: 1px solid var(--beige);
  background: transparent;
  color: var(--brown-mid);
  font-family: var(--font-sans);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  transition: var(--transition);
  border-radius: var(--radius);
}

.copy-btn:hover { border-color: var(--amber); color: var(--amber); }
.copy-btn.copied { border-color: #2D6A30; color: #2D6A30; }

.copy-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

/* ── Rendered markdown ───────────────────────────────────────── */
.seo-body { line-height: 1.85; }

.seo-body .seo-h2 {
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--amber);
  margin: 28px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--beige-light);
}

.seo-body .seo-h2:first-child { margin-top: 0; }

.seo-body .seo-p {
  font-family: var(--font-serif);
  font-size: 16px;
  color: var(--brown);
  margin-bottom: 10px;
}

.seo-body .seo-p:first-of-type {
  font-style: italic;
  border-left: 2px solid var(--gold);
  padding-left: 16px;
  margin-left: 0;
  color: var(--brown-mid);
}

.seo-body .seo-strong {
  font-family: var(--font-sans);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--olive);
  display: block;
  margin: 16px 0 4px;
}

.seo-body .seo-code {
  font-family: 'Courier New', monospace;
  font-size: 13px;
  background: var(--ivory-dark);
  padding: 8px 12px;
  display: block;
  color: var(--brown-mid);
  border-left: 2px solid var(--beige);
  margin-bottom: 8px;
  word-break: break-all;
}

/* ── Error state ─────────────────────────────────────────────── */
.error-msg {
  display: none;
  margin-top: 20px;
  padding: 14px 18px;
  background: #FEF0EE;
  border-left: 3px solid #C0392B;
  font-family: var(--font-sans);
  font-size: 11px;
  color: #8A2E2A;
  letter-spacing: 0.02em;
}

.error-msg.is-visible { display: block; }

/* ── Footer ──────────────────────────────────────────────────── */
.footer {
  text-align: center;
  margin-top: 80px;
  color: var(--muted);
  font-family: var(--font-sans);
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}
</style>
</head>

<body>
<div class="page">

  <!-- Header -->
  <header class="header">
    <h1 class="header__wordmark">Namarq</h1>
    <span class="header__sub">Perfume House · AI Tools</span>
    <div class="header__rule"></div>
  </header>

  <!-- Input Card -->
  <div class="card">

    <label class="form__label" for="nameInput">Fragrance Name</label>
    <input
      id="nameInput"
      class="form__input"
      type="text"
      placeholder="e.g. Dior Sauvage, Black Orchid, Aventus"
      autocomplete="off"
      spellcheck="false"
    >

    <button class="form__btn" id="generateBtn" onclick="generate()">
      Generate SEO Content
    </button>

    <!-- Error -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="loading__dots">
        <div class="loading__dot"></div>
        <div class="loading__dot"></div>
        <div class="loading__dot"></div>
      </div>
      <div class="loading__text">Analyzing fragrance profile</div>
    </div>

    <!-- Result -->
    <div class="result" id="result">

      <!-- Name + Confidence -->
      <div class="result__header">
        <div>
          <div class="result__name" id="resultName"></div>
          <div class="result__house" id="resultHouse"></div>
        </div>
        <div class="badge" id="confidenceBadge">
          <div class="badge__dot"></div>
          <span id="confidenceLabel"></span>
        </div>
      </div>

      <!-- Olfactory Profile Grid -->
      <div class="profile" id="profileGrid"></div>

      <!-- SEO Output -->
      <div class="seo-output">
        <div class="seo-output__toolbar">
          <span class="seo-output__label">SEO Output</span>
          <button class="copy-btn" id="copyBtn" onclick="copyOutput()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            Copy All
          </button>
        </div>
        <div class="seo-body" id="seoBody"></div>
      </div>

    </div><!-- /result -->

  </div><!-- /card -->

  <footer class="footer">Namarq · Internal Tool · Not for distribution</footer>
</div><!-- /page -->

<script>
// ── State ──────────────────────────────────────────────────────────────────
let lastRawSEO = ""; // Stores plain text for clipboard

// ── Generate ───────────────────────────────────────────────────────────────
async function generate() {
  const nameInput  = document.getElementById("nameInput");
  const btn        = document.getElementById("generateBtn");
  const loading    = document.getElementById("loading");
  const result     = document.getElementById("result");
  const errorMsg   = document.getElementById("errorMsg");

  const name = nameInput.value.trim();

  // Validation
  if (!name) {
    showError("Please enter a fragrance name.");
    nameInput.focus();
    return;
  }

  // UI → loading state
  hideError();
  result.classList.remove("is-visible");
  loading.classList.add("is-active");
  btn.disabled = true;
  btn.textContent = "Generating…";

  try {
    const response = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error || `Server error ${response.status}`);
    }

    const data = await response.json();

    if (data.error) throw new Error(data.error);

    renderResult(data);

  } catch (err) {
    showError(err.message || "Something went wrong. Please try again.");
  } finally {
    loading.classList.remove("is-active");
    btn.disabled = false;
    btn.textContent = "Generate SEO Content";
  }
}

// ── Render result ──────────────────────────────────────────────────────────
function renderResult(data) {
  const result = document.getElementById("result");

  // Name + house
  document.getElementById("resultName").textContent  = data.name || "—";
  document.getElementById("resultHouse").textContent = data.house || "";

  // Confidence badge
  const badge = document.getElementById("confidenceBadge");
  const label = document.getElementById("confidenceLabel");
  const conf  = (data.confidence || "low").toLowerCase();
  badge.className = `badge badge--${conf}`;
  label.textContent = data.confidence || "Low";

  // Profile grid
  const grid = document.getElementById("profileGrid");
  const p    = data.profile || {};
  const fields = [
    ["Top Notes",      p.top],
    ["Heart Notes",    p.heart],
    ["Base Notes",     p.base],
    ["Gender",         p.gender],
    ["Concentration",  p.concentration],
    ["Season",         p.season],
    ["Occasion",       p.occasion],
    ["Longevity",      p.longevity],
    ["Sillage",        p.sillage],
    ["Character",      p.vibe],
  ];

  grid.innerHTML = fields.map(([key, val]) => `
    <div class="profile__cell">
      <div class="profile__key">${key}</div>
      <div class="profile__val">${val || "—"}</div>
    </div>
  `).join("");

  // SEO body
  lastRawSEO = data.seo || "";
  document.getElementById("seoBody").innerHTML = renderMarkdown(lastRawSEO);

  // Reset copy button
  const copyBtn = document.getElementById("copyBtn");
  copyBtn.classList.remove("copied");
  copyBtn.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
    </svg>
    Copy All`;

  // Show result
  result.classList.add("is-visible");
  result.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ── Markdown renderer ──────────────────────────────────────────────────────
// Custom renderer that produces our design-system classes.
// Handles: ## headings, **bold**, `/path/url` code, paragraphs.
// Processes line-by-line to avoid the broken regex replacement chain.
function renderMarkdown(text) {
  if (!text) return "";

  const lines  = text.split("\n");
  const output = [];
  let   inParagraph = false;
  let   firstParagraph = true;

  function closeParagraph() {
    if (inParagraph) { output.push("</p>"); inParagraph = false; }
  }

  for (const rawLine of lines) {
    const line = rawLine.trimEnd();

    // H2 heading: ## Section Title
    if (/^## /.test(line)) {
      closeParagraph();
      const heading = line.replace(/^## /, "").trim();
      output.push(`<div class="seo-h2">${escapeHTML(heading)}</div>`);
      if (heading.toLowerCase().includes("short description")) firstParagraph = true;
      continue;
    }

    // Bold label: **Label**  (standalone line)
    if (/^\*\*[^*]+\*\*$/.test(line.trim())) {
      closeParagraph();
      const label = line.trim().replace(/^\*\*|\*\*$/g, "");
      output.push(`<span class="seo-strong">${escapeHTML(label)}</span>`);
      continue;
    }

    // Code / URL line: starts with / or http or ../
    if (/^\s*(\/|https?:\/\/|\.\.\/)\S/.test(line)) {
      closeParagraph();
      output.push(`<code class="seo-code">${escapeHTML(line.trim())}</code>`);
      continue;
    }

    // Blank line → close current paragraph
    if (line.trim() === "") {
      closeParagraph();
      continue;
    }

    // Regular text → paragraph
    if (!inParagraph) {
      const cls = firstParagraph ? "" : ""; // first-of-type handles the italic style
      output.push(`<p class="seo-p">`);
      inParagraph = true;
      firstParagraph = false;
    } else {
      output.push(" "); // inline space between continued lines
    }

    // Inline **bold** within text
    const inlined = escapeHTML(line.trim()).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    output.push(inlined);
  }

  closeParagraph();
  return output.join("");
}

// ── Copy to clipboard ──────────────────────────────────────────────────────
async function copyOutput() {
  if (!lastRawSEO) return;

  const btn = document.getElementById("copyBtn");

  try {
    await navigator.clipboard.writeText(lastRawSEO);
    btn.classList.add("copied");
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Copied`;
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        Copy All`;
    }, 2500);
  } catch {
    // Fallback for browsers that block clipboard
    const ta = document.createElement("textarea");
    ta.value = lastRawSEO;
    ta.style.position = "fixed";
    ta.style.opacity  = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    btn.textContent = "Copied ✓";
    setTimeout(() => { btn.textContent = "Copy All"; }, 2000);
  }
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent = msg;
  el.classList.add("is-visible");
}

function hideError() {
  document.getElementById("errorMsg").classList.remove("is-visible");
}

function escapeHTML(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Keyboard shortcut: Enter to generate ──────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("nameInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") generate();
  });
});
</script>

</body>
</html>
