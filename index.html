<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namarq AI — Perfume Intelligence</title>
<meta name="description" content="AI-powered SEO intelligence for Namarq Perfumes. Internal tool.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root {
  --black:    #0A0A08;
  --black2:   #111110;
  --black3:   #1A1A18;
  --black4:   #252522;
  --grey1:    #2E2E2B;
  --grey2:    #3D3D3A;
  --grey3:    #6B6B66;
  --grey4:    #9A9A94;
  --off:      #C8C8C0;
  --cream:    #E8E5DC;
  --gold:     #C9A84C;
  --gold2:    #E6C97A;
  --gold3:    #F5E4A8;
  --amber:    #B87333;
  --red:      #8B2020;
  --green:    #1A4A1A;
  --green2:   #2D7A2D;

  --display:  'Bebas Neue', sans-serif;
  --serif:    'DM Serif Display', Georgia, serif;
  --body:     'Barlow', system-ui, sans-serif;
  --mono:     'DM Mono', monospace;

  --ease:     cubic-bezier(0.16, 1, 0.3, 1);
}

/* ═══════════════════════════════════════════
   RESET + BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--cream);
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════
   NOISE TEXTURE OVERLAY
═══════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 9999;
}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.page {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px 120px;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.header {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  border-bottom: 1px solid var(--grey1);
  padding: 40px 0 20px;
  margin-bottom: 72px;
  gap: 24px;
}

.header__left { display: flex; flex-direction: column; gap: 2px; }

.header__wordmark {
  font-family: var(--display);
  font-size: clamp(56px, 10vw, 96px);
  letter-spacing: 0.08em;
  color: var(--cream);
  line-height: 0.9;
  text-transform: uppercase;
}

.header__wordmark span {
  color: var(--gold);
}

.header__sub {
  font-family: var(--body);
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.5em;
  color: var(--grey3);
  text-transform: uppercase;
  margin-top: 8px;
}

.header__badge {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--gold);
  border: 1px solid var(--grey1);
  padding: 6px 12px;
  text-transform: uppercase;
  white-space: nowrap;
  align-self: flex-start;
  margin-top: 12px;
}

/* ═══════════════════════════════════════════
   INPUT ZONE
═══════════════════════════════════════════ */
.input-zone {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0;
  border: 1px solid var(--grey2);
  margin-bottom: 60px;
  position: relative;
}

.input-zone::before {
  content: 'FRAGRANCE';
  position: absolute;
  top: -1px;
  left: 20px;
  transform: translateY(-50%);
  background: var(--black);
  padding: 0 8px;
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.35em;
  color: var(--gold);
}

.input-zone input {
  background: transparent;
  border: none;
  outline: none;
  padding: 22px 24px;
  font-family: var(--serif);
  font-size: 22px;
  color: var(--cream);
  width: 100%;
  caret-color: var(--gold);
}

.input-zone input::placeholder {
  color: var(--grey2);
  font-style: italic;
}

.input-zone input:focus {
  background: var(--black2);
}

.generate-btn {
  background: var(--gold);
  border: none;
  color: var(--black);
  font-family: var(--display);
  font-size: 14px;
  letter-spacing: 0.2em;
  padding: 0 32px;
  cursor: pointer;
  transition: background 0.2s var(--ease), color 0.2s;
  white-space: nowrap;
  min-width: 140px;
}

.generate-btn:hover:not(:disabled) {
  background: var(--gold2);
}

.generate-btn:disabled {
  background: var(--grey1);
  color: var(--grey3);
  cursor: not-allowed;
}

/* ═══════════════════════════════════════════
   ERROR
═══════════════════════════════════════════ */
.error-bar {
  display: none;
  background: var(--red);
  border-left: 3px solid #FF4444;
  padding: 12px 20px;
  margin-bottom: 24px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  color: #FF9999;
}
.error-bar.is-visible { display: block; }

/* ═══════════════════════════════════════════
   LOADING
═══════════════════════════════════════════ */
.loading-panel {
  display: none;
  padding: 64px 0;
  text-align: center;
}
.loading-panel.is-active { display: block; }

.loading-bar-wrap {
  width: 240px;
  height: 1px;
  background: var(--grey1);
  margin: 0 auto 28px;
  position: relative;
  overflow: hidden;
}

.loading-bar {
  position: absolute;
  top: 0; left: -60%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: scan 1.8s ease-in-out infinite;
}

@keyframes scan {
  0%   { left: -60%; }
  100% { left: 100%; }
}

.loading-steps {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.loading-step {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--grey3);
  opacity: 0;
  transition: opacity 0.4s;
}

.loading-step.is-active {
  color: var(--gold);
  opacity: 1;
}

.loading-step.is-done {
  color: var(--grey2);
  opacity: 0.5;
}

/* ═══════════════════════════════════════════
   RESULT
═══════════════════════════════════════════ */
.result {
  display: none;
  animation: rise 0.5s var(--ease) forwards;
}
.result.is-visible { display: block; }

@keyframes rise {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Identity Row ────────────────────────────── */
.identity {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--grey1);
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.identity__name {
  font-family: var(--display);
  font-size: clamp(36px, 6vw, 64px);
  line-height: 0.95;
  letter-spacing: 0.04em;
  color: var(--cream);
  text-transform: uppercase;
}

.identity__house {
  font-family: var(--body);
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--grey3);
  text-transform: uppercase;
  margin-top: 6px;
}

.identity__meta {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
}

/* ── Confidence Badge ────────────────────────── */
.conf-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  border: 1px solid;
}

.conf-badge--high   { border-color: var(--green2); color: #6DCC6D; background: rgba(45,122,45,0.12); }
.conf-badge--medium { border-color: var(--gold);   color: var(--gold2); background: rgba(201,168,76,0.10); }
.conf-badge--low    { border-color: var(--red);    color: #FF8080; background: rgba(139,32,32,0.12); }

.conf-badge__dot {
  width: 5px; height: 5px; border-radius: 50%;
  animation: blink 2s ease-in-out infinite;
}
.conf-badge--high   .conf-badge__dot { background: #6DCC6D; }
.conf-badge--medium .conf-badge__dot { background: var(--gold2); }
.conf-badge--low    .conf-badge__dot { background: #FF8080; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.kb-tag {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  color: var(--gold);
  border: 1px solid var(--grey1);
  padding: 4px 10px;
  text-transform: uppercase;
}

/* ── Profile Grid ───────────────────────────── */
.profile-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--grey1);
  border: 1px solid var(--grey1);
  margin-bottom: 48px;
}

@media (max-width: 700px) {
  .profile-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 400px) {
  .profile-grid { grid-template-columns: 1fr; }
}

.profile-cell {
  background: var(--black2);
  padding: 18px 20px;
  transition: background 0.2s;
}

.profile-cell:hover { background: var(--black3); }

.profile-cell--wide {
  grid-column: span 2;
}

.profile-key {
  font-family: var(--mono);
  font-size: 7px;
  letter-spacing: 0.35em;
  color: var(--grey3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.profile-val {
  font-family: var(--body);
  font-weight: 400;
  font-size: 13px;
  color: var(--off);
  line-height: 1.5;
}

.profile-val--notes {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--cream);
  font-style: italic;
}

/* ── Accords pills ──────────────────────────── */
.accord-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}

.accord-pill {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid var(--grey2);
  color: var(--gold);
  background: rgba(201,168,76,0.06);
}

/* ── SEO Panel ──────────────────────────────── */
.seo-panel {
  border: 1px solid var(--grey1);
  background: var(--black2);
}

.seo-panel__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--grey1);
  flex-wrap: wrap;
  gap: 12px;
}

.seo-panel__title {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.4em;
  color: var(--grey3);
  text-transform: uppercase;
}

.seo-panel__actions {
  display: flex;
  gap: 8px;
}

.copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 16px;
  border: 1px solid var(--grey2);
  background: transparent;
  color: var(--off);
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.copy-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.copy-btn.copied {
  border-color: var(--green2);
  color: #6DCC6D;
}

.copy-btn svg { width: 11px; height: 11px; flex-shrink: 0; }

.seo-body {
  padding: 32px 28px;
}

/* ── SEO Markdown Styles ────────────────────── */
.seo-section {
  margin-bottom: 32px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--grey1);
}
.seo-section:last-child {
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: none;
}

.seo-section-title {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.seo-section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--grey1);
}

.seo-description {
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.8;
  color: var(--cream);
  font-style: italic;
  border-left: 2px solid var(--gold);
  padding-left: 20px;
}

.seo-meta-value {
  font-family: var(--body);
  font-weight: 400;
  font-size: 15px;
  color: var(--off);
  line-height: 1.6;
}

.seo-url {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--gold2);
  background: var(--black3);
  padding: 12px 16px;
  border-left: 2px solid var(--grey2);
  word-break: break-all;
}

.seo-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.seo-tag {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  padding: 5px 12px;
  border: 1px solid var(--grey2);
  color: var(--grey4);
  text-transform: lowercase;
  transition: all 0.15s;
}

.seo-tag:hover {
  border-color: var(--grey3);
  color: var(--off);
}

/* ── Vote Score Bar ─────────────────────────── */
.vote-bar-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 24px;
  border-top: 1px solid var(--grey1);
}

.vote-bar-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.25em;
  color: var(--grey3);
  text-transform: uppercase;
  white-space: nowrap;
}

.vote-bar-track {
  flex: 1;
  height: 2px;
  background: var(--grey1);
  position: relative;
  overflow: hidden;
}

.vote-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber), var(--gold), var(--gold2));
  transition: width 0.8s var(--ease);
}

.vote-bar-score {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--gold);
  white-space: nowrap;
}

/* ── Footer ─────────────────────────────────── */
.footer {
  margin-top: 80px;
  padding-top: 20px;
  border-top: 1px solid var(--grey1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.footer__left {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.3em;
  color: var(--grey2);
  text-transform: uppercase;
}

.footer__right {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  color: var(--grey2);
}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 640px) {
  .header { grid-template-columns: 1fr; }
  .input-zone { grid-template-columns: 1fr; }
  .generate-btn { padding: 16px; min-width: unset; }
  .seo-body { padding: 24px 20px; }
  .identity__meta { align-items: flex-start; }
}
</style>
</head>

<div class="page">

  <!-- ── HEADER ─────────────────────────────── -->

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let lastSEORaw = "";
let stepTimer  = null;

// ══════════════════════════════════════════════
// GENERATE (UPDATED WITH SCRAPING)
// ══════════════════════════════════════════════
async function generate() {

  const input = document.getElementById("nameInput");
  const btn   = document.getElementById("generateBtn");
  const raw   = input.value.trim();

  if (!raw) {
    showError("Please enter a fragrance name.");
    return;
  }

  hideError();
  hideResult();
  showLoading();

  btn.disabled = true;
  btn.textContent = "SCRAPING…";

  try {

    const name = normalizeName(raw);

    // ========= SEARCH =========
    const searchUrl = "https://www.fragrantica.com/search/?query=" + encodeURIComponent(name);
    const searchHtml = await fetchProxy(searchUrl);

    const match = searchHtml.match(/href="(\/perfume\/[^"]+)"/);
    if (!match) throw new Error("Perfume not found");

    const perfumeUrl = "https://www.fragrantica.com" + match[1];

    // ========= SCRAPE =========
    const html = await fetchProxy(perfumeUrl);
    const profile = parseFragrantica(html);

    btn.textContent = "GENERATING SEO…";

    // ========= SEND TO API =========
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name, profile })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "API failed");

    // ========= MERGE =========
    data.profile = { ...profile, ...(data.profile || {}) };
    data.name = name;
    data.house = extractHouse(perfumeUrl);
    data.confidence = "High";
    data.voteScore = 18;
    data.voteMax = 21;

    renderResult(data);

  } catch (err) {
    hideLoading();
    showError(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "GENERATE";
  }
}

// ══════════════════════════════════════════════
// SCRAPER HELPERS
// ══════════════════════════════════════════════
async function fetchProxy(url) {
  const res = await fetch(
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(url)
  );
  return await res.text();
}

function parseFragrantica(html) {
  return {
    top: extract(html, "top"),
    heart: extract(html, "middle"),
    base: extract(html, "base"),
    accords: extractAccords(html),
    gender: detectGender(html),
    concentration: "EDT",
    season: "All Seasons",
    occasion: "Versatile",
    longevity: extractLongevity(html),
    sillage: extractSillage(html),
    vibe: "Refined"
  };
}

function extract(html, type) {
  const section = html.match(new RegExp(type + " notes?[\\s\\S]{0,1200}", "i"));
  if (!section) return "";

  const notes = [...section[0].matchAll(/title="([^"]+)"/g)]
    .map(m => m[1])
    .slice(0, 8);

  return notes.join(", ");
}

function extractAccords(html) {
  const accords = [...html.matchAll(/class="accord[^"]*">([^<]+)/gi)]
    .map(m => m[1])
    .slice(0, 6);

  return accords.join(", ");
}

function detectGender(html) {
  if (/for men/i.test(html)) return "Men";
  if (/for women/i.test(html)) return "Women";
  if (/for women and men/i.test(html)) return "Unisex";
  return "Unisex";
}

function extractLongevity(html) {
  const m = html.match(/(long lasting|moderate|weak)/i);
  return m ? m[1] : "Moderate";
}

function extractSillage(html) {
  const m = html.match(/(strong|moderate|soft)/i);
  return m ? m[1] : "Moderate";
}

function extractHouse(url) {
  const m = url.match(/\/perfume\/([^/]+)\//);
  return m ? m[1].replace(/-/g, " ") : "";
}

function normalizeName(name) {
  const fixes = {
    "dior suvage": "Dior Sauvage",
    "suvage": "Dior Sauvage",
    "creed": "Creed Aventus"
  };
  return fixes[name.toLowerCase()] || name;
}
