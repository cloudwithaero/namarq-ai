<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namarq AI</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400&family=EB+Garamond&display=swap" rel="stylesheet">

<style>
:root {
  --ivory: #FAF8F4;
  --olive: #6B705C;
  --brown: #3E2F23;
  --beige: #D6CCC2;
  --amber: #A47148;
}

body {
  margin: 0;
  background: var(--ivory);
  color: var(--brown);
  font-family: 'EB Garamond', serif;
}

/* layout */
.container {
  max-width: 900px;
  margin: auto;
  padding: 80px 30px;
}

/* logo */
.logo {
  text-align: center;
  margin-bottom: 50px;
}

.logo h1 {
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.5em;
  font-weight: 300;
}

.logo span {
  font-family: 'Montserrat';
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--olive);
}

/* card */
.card {
  background: white;
  padding: 40px;
  border: 1px solid var(--beige);
}

/* inputs */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

input {
  padding: 12px;
  border: 1px solid var(--beige);
  background: transparent;
  font-family: 'EB Garamond';
}

/* button */
button {
  margin-top: 30px;
  width: 100%;
  padding: 14px;
  border: none;
  background: var(--brown);
  color: white;
  letter-spacing: 0.2em;
  cursor: pointer;
}

button:hover {
  background: var(--olive);
}

/* result container */
.result {
  margin-top: 50px;
  padding: 40px;
  border: 1px solid var(--beige);
  background: #fff;
  line-height: 1.9;
}

/* headings */
.result h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  margin-bottom: 10px;
}

.result h3 {
  font-family: 'Montserrat';
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--olive);
  margin-top: 25px;
}

/* highlight paragraph */
.result p {
  margin: 10px 0;
}

.result p:first-of-type {
  font-style: italic;
  font-size: 18px;
  border-left: 2px solid var(--amber);
  padding-left: 15px;
}

/* copy button */
.copy {
  margin-top: 15px;
  background: transparent;
  border: 1px solid var(--brown);
  color: var(--brown);
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <h1>NAMARQ</h1>
    <span>PERFUME HOUSE</span>
  </div>

  <div class="card">

    <div class="grid">
      <input id="name" placeholder="Product Name">
      <input id="gender" placeholder="Gender">
      <input id="top" placeholder="Top Notes">
      <input id="heart" placeholder="Heart Notes">
      <input id="base" placeholder="Base Notes">
      <input id="vibe" placeholder="Vibe / Occasion">
    </div>

    <button onclick="generate()" id="btn">GENERATE</button>

    <div id="result" class="result"></div>

    <button class="copy" onclick="copyText()">Copy Output</button>

  </div>

</div>

<script>
async function generate() {

  const btn = document.getElementById("btn");
  btn.innerText = "Generating...";
  btn.disabled = true;

  const data = {
    name: name.value,
    gender: gender.value,
    top: top.value,
    heart: heart.value,
    base: base.value,
    vibe: vibe.value
  };

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });

    const json = await res.json();

    // 🔥 format output
    result.innerHTML = formatOutput(json.output);

  } catch {
    result.innerHTML = "<p>❌ Error generating content</p>";
  }

  btn.innerText = "GENERATE";
  btn.disabled = false;
}


// ✨ format function (luxury rendering)
function formatOutput(text) {

  if (!text) return "";

  let html = text;

  html = html.replace(/## (.*)/g, '<h2>$1</h2>');
  html = html.replace(/\*\*(.*?)\*\*/g, '<h3>$1</h3>');
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');

  html = "<p>" + html + "</p>";

  return html;
}


// copy
function copyText() {
  navigator.clipboard.writeText(result.innerText);
  alert("Copied");
}
</script>

</body>
</html>
